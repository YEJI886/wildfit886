  <style>
:root {
  --bg: #faf8f5;
  --card: #ffffff;
  --text: #1a1a1a;
  --text-secondary: #888888;
  --text-muted: #b0a8a0;
  --accent: #8b7355;
  --border: #ebe7e2;
  --border-hover: #d4cdc4;
  --success: #5a8a6a;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* App Container */
.app-container {
  max-width: 640px;
  margin: 0 auto;
  padding: 0 20px;
}

/* Logo Container */
.logo-container {
  padding: 100px 0 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.logo-img {
  width: 180px;
  height: auto;
  margin-bottom: 8px;
}

.logo-slogan {
  font-size: 10px;
  color: var(--accent);
  letter-spacing: 4px;
  font-weight: 300;
}

/* Sticky Header */
.sticky-header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  background: var(--bg);
  padding: 10px 20px;
  transform: translateY(-100%);
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
  box-shadow: 0 1px 0 var(--border);
}

.sticky-header.visible {
  transform: translateY(0);
}

.sticky-header-content {
  max-width: 640px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.sticky-logo {
  height: 32px;
  width: auto;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.sticky-slogan {
  font-size: 10px;
  color: var(--accent);
  letter-spacing: 2px;
  font-weight: 300;
  opacity: 1;
  transition: opacity 0.4s ease;
}

/* Hero */
.hero-section {
  text-align: center;
  padding-bottom: 20px;
}

.hero-subtitle {
  font-size: 11px;
  color: var(--text-secondary);
  font-weight: 300;
}

/* Category Tabs */
.category-tabs {
  display: flex;
  gap: 10px;
  padding-bottom: 20px;
}

.category-tab {
  flex: 1;
  padding: 12px 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 13px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.3s ease;
}

.category-tab.active[data-category="she"] {
  background: linear-gradient(135deg, #FFDDD2 0%, #F8C8C8 100%);
  border-color: #F8C8C8;
  color: #8B6B61;
}

.category-tab.active[data-category="he"] {
  background: linear-gradient(135deg, #D4E8F7 0%, #B8D4E8 100%);
  border-color: #B8D4E8;
  color: #5A7A8B;
}

.category-tab:hover:not(.active) {
  border-color: var(--border-hover);
}

/* Product Categories */
.product-category {
  margin-bottom: 24px;
}

.category-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}

.category-icon {
  font-size: 18px;
}

.category-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}

.category-divider {
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* Price Options - Flex Squeeze Layout */
.price-options {
  display: flex;
  gap: 0;
  position: relative;
  border-radius: 16px;
  overflow: visible;
  background: var(--card);
  border: 1.5px solid var(--border);
  transition: border-color 0.3s ease;
  padding: 8px;
}

.price-options.has-selected {
  border-color: var(--accent);
}

.price-card {
  flex: 1;
  padding: 16px 8px;
  cursor: pointer;
  transition: flex 0.4s cubic-bezier(0.25, 0.1, 0.25, 1), 
              opacity 0.35s ease,
              box-shadow 0.3s ease,
              background 0.3s ease,
              z-index 0s;
  text-align: center;
  position: relative;
  background: var(--card);
  border: none;
  border-radius: 12px;
  overflow: hidden;
  will-change: flex;
}

.price-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  border-radius: 0;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
}

.price-card.selected::before {
  background: linear-gradient(135deg, rgba(139, 115, 85, 0.1), rgba(139, 115, 85, 0.05));
  opacity: 1;
}

.price-card.selected {
  flex: 2;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
  border: 2px solid var(--accent);
  border-radius: 14px;
  z-index: 2;
  background: var(--card);
}

.price-card.unselected {
  flex: 1;
  opacity: 0.5;
}

.price-card.unselected:hover {
  opacity: 0.7;
}

.price-value {
  font-size: 26px;
  font-weight: 700;
  margin-bottom: 4px;
  transition: font-size 0.35s cubic-bezier(0.25, 0.1, 0.25, 1), 
              color 0.3s ease;
  color: var(--text);
}

.price-card.selected .price-value {
  font-size: 30px;
  color: var(--accent);
  font-weight: 700;
}

.price-card.unselected .price-value {
  font-size: 22px;
}

.price-label {
  font-size: 11px;
  opacity: 0.7;
  margin-bottom: 8px;
  transition: opacity 0.3s ease;
}

.price-card.unselected .price-label {
  opacity: 0.5;
}

.price-tag {
  display: inline-block;
  padding: 3px 10px;
  background: rgba(139, 115, 85, 0.15);
  border-radius: 20px;
  font-size: 10px;
  color: var(--accent);
  margin-bottom: 6px;
}

.price-hint {
  font-size: 10px;
  color: var(--text-muted);
  line-height: 1.4;
  opacity: 1;
  transition: opacity 0.3s ease;
}

.price-card.unselected .price-hint {
  opacity: 0;
  height: 0;
  margin: 0;
}

/* Detail Hint */
.detail-hint {
  text-align: center;
  padding: 16px;
  color: var(--text-muted);
  font-size: 12px;
  transition: all 0.3s ease;
}

.detail-hint.hidden {
  opacity: 0;
  height: 0;
  padding: 0;
  overflow: hidden;
}

/* Product Detail */
.product-detail {
  background: var(--card);
  border-radius: 14px;
  padding: 20px;
  margin-top: 12px;
  border: 1px solid var(--border);
  animation: slideDown 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

@keyframes slideDown {
  from {
    opacity: 0;
    transform: translateY(-10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.detail-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--text);
}

.detail-items {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.detail-item {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 6px 12px;
  background: var(--bg);
  border-radius: 20px;
  font-size: 11px;
  color: var(--text-secondary);
}

.detail-item-icon {
  font-size: 12px;
}

/* Form */
.form-section {
  background: var(--card);
  border-radius: 16px;
  padding: 24px;
  margin-top: 24px;
  border: 1px solid var(--border);
}

.form-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 20px;
  text-align: center;
}

.form-group {
  margin-bottom: 16px;
}

.form-label {
  display: block;
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

.form-label .optional {
  color: var(--text-muted);
  font-weight: 300;
}

.form-input {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 14px;
  font-family: inherit;
  background: var(--bg);
  color: var(--text);
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
}

.form-input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(139, 115, 85, 0.1);
}

.form-input::-moz-placeholder {
  color: var(--text-muted);
}

.form-input::placeholder {
  color: var(--text-muted);
}

textarea.form-input {
  resize: vertical;
  min-height: 80px;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

/* Delivery Info */
.delivery-info {
  background: var(--bg);
  border-radius: 12px;
  padding: 14px;
  margin-top: 16px;
}

.delivery-title {
  font-size: 12px;
  font-weight: 500;
  color: var(--accent);
  margin-bottom: 8px;
}

.delivery-text {
  font-size: 11px;
  color: var(--text-secondary);
  line-height: 1.6;
}

/* Submit Button */
.submit-section {
  margin-top: 24px;
  padding-bottom: 40px;
}

.submit-btn {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--accent), #6d5a45);
  color: white;
  border: none;
  border-radius: 14px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(139, 115, 85, 0.3);
}

.submit-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(139, 115, 85, 0.4);
}

.submit-btn:active {
  transform: translateY(0);
}

.submit-btn:disabled {
  background: var(--border);
  color: var(--text-muted);
  cursor: not-allowed;
  box-shadow: none;
  transform: none;
}

/* Toast */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-100px);
  background: var(--success);
  color: white;
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  z-index: 2000;
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
}

.toast.visible {
  transform: translateX(-50%) translateY(0);
}

/* Order Modal */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.5);
  z-index: 1500;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s ease;
}

.modal-overlay.visible {
  opacity: 1;
  visibility: visible;
}

.modal {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.9);
  background: var(--card);
  border-radius: 20px;
  padding: 24px;
  width: calc(100% - 40px);
  max-width: 500px;
  max-height: 80vh;
  overflow-y: auto;
  z-index: 1501;
  opacity: 0;
  visibility: hidden;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.modal-overlay.visible + .modal,
.modal.visible {
  opacity: 1;
  visibility: visible;
  transform: translate(-50%, -50%) scale(1);
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.modal-title {
  font-size: 18px;
  font-weight: 600;
}

.modal-close {
  width: 32px;
  height: 32px;
  border: none;
  background: var(--bg);
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  transition: all 0.3s ease;
}

.modal-close:hover {
  background: var(--border);
  color: var(--text);
}

.order-content {
  background: var(--bg);
  border-radius: 14px;
  padding: 16px;
  font-size: 13px;
  line-height: 1.8;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 300px;
  overflow-y: auto;
}

.order-actions {
  display: flex;
  gap: 12px;
  margin-top: 20px;
}

.order-btn {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s ease;
}

.order-btn-copy {
  background: linear-gradient(135deg, var(--accent), #6d5a45);
  color: white;
}

.order-btn-copy:hover {
  box-shadow: 0 4px 15px rgba(139, 115, 85, 0.3);
}

.order-btn-close {
  background: var(--bg);
  color: var(--text-secondary);
}

.order-btn-close:hover {
  background: var(--border);
}

/* Responsive */
@media (max-width: 480px) {
  .form-row {
    grid-template-columns: 1fr;
  }
  
  .price-card {
    padding: 14px 6px;
  }
  
  .price-value {
    font-size: 22px;
    padding: 3px 10px;
  }
  
  .price-card.selected .price-value {
    font-size: 26px;
  }
}
  </style>

    function renderCategoryTabs() {
      return `
        <div class="category-tabs">
          <button class="category-tab ${state.category === 'she' ? 'active' : ''}" data-category="she">
            She · 女生专属
          </button>
          <button class="category-tab ${state.category === 'he' ? 'active' : ''}" data-category="he">
            He · 男生专属
          </button>
        </div>
      `;
    }

    function renderPriceCard(price, label, tag, hint) {
      const isSelected = state.selectedPrice === price;
      const otherPriceInCategory = ['49', '69'].includes(price)
        ? (state.selectedPrice === '49' || state.selectedPrice === '69' ? state.selectedPrice !== price : false)
        : (state.selectedPrice === '99' || state.selectedPrice === '129' ? state.selectedPrice !== price : false);
      
      return `
        <div class="price-card ${isSelected ? 'selected' : ''} ${otherPriceInCategory ? 'unselected' : ''}" data-price="${price}">
          <div class="price-tag">${tag}</div>
          <div class="price-value">¥${price}</div>
          <div class="price-label">${label}</div>
          <div class="price-hint">${hint}</div>
        </div>
      `;
    }

    function renderProductDetailForCategory(price) {
      const detail = productDetails[price];
      if (!detail) return '';
      
      return `
        <div class="product-detail">
          <div class="detail-title">${detail.title}</div>
          <div class="detail-items">
            ${detail.items.map(item => `
              <span class="detail-item">
                <span class="detail-item-icon">✨</span>
                ${item.replace('※', '').replace('○', '')}
              </span>
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderProductCategories() {
      const topHint = state.category === 'she' 
        ? '可单件搭配下装' 
        : '可单件搭配裤装';
      const suitHint = state.category === 'she'
        ? '上下装全套搭配'
        : '上下装全套搭配';
      
      const topSelected = ['49', '69'].includes(state.selectedPrice || '');
      const suitSelected = ['99', '129'].includes(state.selectedPrice || '');
      
      return `
        <div class="product-category">
          <div class="category-header">
            <span class="category-icon">👕</span>
            <span class="category-title">${state.category === 'she' ? '她' : '他'} · 上衣盲盒</span>
            <div class="category-divider"></div>
          </div>
          <div class="price-options ${topSelected ? 'has-selected' : ''}">
            ${renderPriceCard('49', '基础款上衣', '基础款', topHint)}
            ${renderPriceCard('69', '精美款上衣', '热销款', topHint)}
          </div>
          ${topSelected && state.selectedPrice ? renderProductDetailForCategory(state.selectedPrice) : `
            <div class="detail-hint ${state.selectedPrice ? 'hidden' : ''}">
              点击卡片查看详情
            </div>
          `}
        </div>

        <div class="product-category">
          <div class="category-header">
            <span class="category-icon">👗</span>
            <span class="category-title">${state.category === 'she' ? '她' : '他'} · 套装盲盒</span>
            <div class="category-divider"></div>
          </div>
          <div class="price-options ${suitSelected ? 'has-selected' : ''}">
            ${renderPriceCard('99', '基础套装', '套装搭配', suitHint)}
            ${renderPriceCard('129', '精选套装', '精选款', suitHint)}
          </div>
          ${suitSelected && state.selectedPrice ? renderProductDetailForCategory(state.selectedPrice) : `
            <div class="detail-hint ${state.selectedPrice ? 'hidden' : ''}">
              点击卡片查看详情
            </div>
          `}
        </div>
      `;
    }

    function renderForm() {
      return `
        <div class="form-section">
          <div class="form-title">填写配送信息</div>
          
          <div class="form-group">
            <label class="form-label">您的称呼</label>
            <input type="text" class="form-input" id="nameInput" placeholder="方便骑手联系您" value="${state.form.name}">
          </div>
          
          <div class="form-group">
            <label class="form-label">联系电话</label>
            <input type="tel" class="form-input" id="phoneInput" placeholder="必填" value="${state.form.phone}">
          </div>
          
          <div class="form-group">
            <label class="form-label">配送地址</label>
            <input type="text" class="form-input" id="addressInput" placeholder="蓬江区/江海区/新会区" value="${state.form.address}">
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">身高 <span class="optional">(选填)</span></label>
              <input type="text" class="form-input" id="heightInput" placeholder="如: 165cm" value="${state.form.height}">
            </div>
          </div>
          
          <div class="form-group">
            <label class="form-label">风格偏好</label>
            <input type="text" class="form-input" id="styleInput" placeholder="如: 简约、休闲、复古..." value="${state.form.style}">
          </div>
          
          <div class="form-group">
            <label class="form-label">备注 <span class="optional">(选填)</span></label>
            <textarea class="form-input" id="noteInput" placeholder="其他要求或想法...">${state.form.note}</textarea>
          </div>
          
          <div class="delivery-info">
            <div class="delivery-title">📍 配送范围</div>
            <div class="delivery-text">
              目前支持江门市区配送：蓬江区、江海区、新会区<br>
              其他区域请咨询客服
            </div>
          </div>
        </div>
      `;
    }

    function renderSubmit() {
      const canSubmit = state.form.name && state.form.phone && state.form.address && state.selectedPrice;
      return `
        <div class="submit-section">
          <button class="submit-btn" id="submitBtn" ${!canSubmit ? 'disabled' : ''}>
            生成订单
          </button>
        </div>
      `;
    }

    function render() {
      const app = document.getElementById('app');
      app.innerHTML = `
        ${renderStickyHeader()}
        <div class="app-container">
          ${renderLogo()}
          <section class="hero-section">
            <h1 class="hero-subtitle">开启你的专属穿搭惊喜</h1>
          </section>
          ${renderCategoryTabs()}
          ${renderProductCategories()}
          ${renderForm()}
          ${renderSubmit()}
        </div>
      `;
      
      attachEventListeners();
      initScrollListener();
    }

    function attachEventListeners() {
      // Category tabs
      document.querySelectorAll('.category-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          state.category = tab.dataset.category;
          state.selectedPrice = null;
          render();
        });
      });

      // Price cards
      document.querySelectorAll('.price-card').forEach(card => {
        card.addEventListener('click', () => {
          const price = card.dataset.price;
          // Check if same price is selected
          if (state.selectedPrice === price) {
            state.selectedPrice = null;
          } else {
            state.selectedPrice = price;
          }
          render();
        });
      });

      // Form inputs
      const inputs = ['name', 'phone', 'address', 'height', 'style', 'note'];
      inputs.forEach(field => {
        const el = document.getElementById(`${field}Input`);
        if (el) {
          el.addEventListener('input', (e) => {
            state.form[field] = e.target.value;
            updateSubmitButton();
          });
        }
      });

      // Submit
      const submitBtn = document.getElementById('submitBtn');
      if (submitBtn) {
        submitBtn.addEventListener('click', handleSubmit);
      }
    }

    function updateSubmitButton() {
      const btn = document.getElementById('submitBtn');
      if (!btn) return;
      
      const canSubmit = state.form.name && state.form.phone && state.form.address && state.selectedPrice;
      btn.disabled = !canSubmit;
    }

    function initScrollListener() {
      const logo = document.querySelector('.logo-container');
      const header = document.getElementById('stickyHeader');
      
      if (!logo || !header) return;
      
      const observer = new IntersectionObserver(
        ([entry]) => {
          header.classList.toggle('visible', !entry.isIntersecting);
        },
        { threshold: 0, rootMargin: '-60px 0px 0px 0px' }
      );
      
      observer.observe(logo);
    }

    function handleSubmit() {
      if (!validateForm()) return;
      
      const orderText = generateOrderText();
      showModal(orderText);
    }

    function validateForm() {
      if (!state.form.name) {
        showToast('请填写称呼');
        return false;
      }
      if (!state.form.phone) {
        showToast('请填写联系电话');
        return false;
      }
      if (!state.form.address) {
        showToast('请填写配送地址');
        return false;
      }
      if (!state.selectedPrice) {
        showToast('请选择盲盒规格');
        return false;
      }
      return true;
    }

    function generateOrderText() {
      const now = new Date();
      const dateStr = `${now.getMonth() + 1}月${now.getDate()}日 ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
      
      const detail = productDetails[state.selectedPrice];
      const categoryLabel = state.category === 'she' ? '女生专区' : '男生专区';
      
      let text = `🎁 WildFit 盲盒订单\n`;
      text += `━━━━━━━━━━━━━━━━\n`;
      text += `📅 ${dateStr}\n`;
      text += `🏷️ ${categoryLabel}\n`;
      text += `💰 ${state.selectedPrice}元 ${detail.title}\n\n`;
      text += `👤 ${state.form.name}\n`;
      text += `📱 ${state.form.phone}\n`;
      text += `📍 ${state.form.address}\n`;
      
      if (state.form.height) {
        text += `📏 身高: ${state.form.height}\n`;
      }
      if (state.form.style) {
        text += `✨ 风格: ${state.form.style}\n`;
      }
      if (state.form.note) {
        text += `📝 备注: ${state.form.note}\n`;
      }
      
      text += `\n━━━━━━━━━━━━━━━━\n`;
      text += `请确认信息并回复"确认下单"~`;
      
      return text;
    }

    function showModal(content) {
      const overlay = document.getElementById('modalOverlay');
      const modal = document.getElementById('modal');
      const orderContent = document.getElementById('orderContent');
      
      if (overlay && modal && orderContent) {
        orderContent.textContent = content;
        overlay.classList.add('visible');
        modal.classList.add('visible');
      }
    }

    function hideModal() {
      const overlay = document.getElementById('modalOverlay');
      const modal = document.getElementById('modal');
      
      if (overlay && modal) {
        overlay.classList.remove('visible');
        modal.classList.remove('visible');
      }
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      if (toast) {
        toast.textContent = message;
        toast.classList.add('visible');
        
        setTimeout(() => {
          toast.classList.remove('visible');
        }, 2000);
      }
    }

    // Modal event listeners
    document.addEventListener('DOMContentLoaded', () => {
      const overlay = document.getElementById('modalOverlay');
      const closeBtn = document.getElementById('modalClose');
      const closeOrderBtn = document.getElementById('closeBtn');
      const copyBtn = document.getElementById('copyBtn');
      
      if (overlay) {
        overlay.addEventListener('click', hideModal);
      }
      if (closeBtn) {
        closeBtn.addEventListener('click', hideModal);
      }
      if (closeOrderBtn) {
        closeOrderBtn.addEventListener('click', hideModal);
      }
      if (copyBtn) {
        copyBtn.addEventListener('click', () => {
          const content = document.getElementById('orderContent');
          if (content) {
            navigator.clipboard.writeText(content.textContent).then(() => {
              showToast('订单已复制');
              hideModal();
            }).catch(() => {
              showToast('复制失败，请手动复制');
            });
          }
        });
      }
    });

    // Init
    render();
  </script>


<div id="html-editor-renderer-root" style="position: fixed; top: 0px; left: 0px;"></div></body></html>
